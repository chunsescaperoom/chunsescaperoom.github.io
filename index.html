<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>純密室 Chun's Room</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom, #050505 0%, #111 45%, #1a1a1a 100%);
      color: white;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }

    .overlay {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.15) 30%, rgba(0,0,0,0.75) 100%);
    }

    .title {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeIn 2s ease;
    }

    /* 🔥 Logo效果 */
    .logo {
      width: 140px;
      margin-bottom: 20px;
      opacity: 0.9;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
      animation: glow 3s infinite alternate;
    }

    .title h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 4px;
      font-weight: 700;
    }

    .title .en {
      margin-top: 10px;
      font-size: 18px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 2px;
    }

    .title .tagline {
      margin-top: 14px;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      letter-spacing: 2px;
    }

    .hallway {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      animation: fadeInUp 1.8s ease;
    }

    .door {
      width: 180px;
      height: 320px;
      background: linear-gradient(to bottom, #2a2a2a, #111);
      border: 2px solid rgba(255,255,255,0.12);
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .door:hover {
      transform: translateY(-8px);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
    }

    .door::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      bottom: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .door-number {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    .door-label {
      position: absolute;
      bottom: 35px;
      width: 100%;
      text-align: center;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
    }

    .knob {
      position: absolute;
      right: 24px;
      top: 52%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    .hint {
      margin-top: 40px;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      animation: flicker 3s infinite;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 10;
    }

    .modal-box {
      width: 100%;
      max-width: 640px;
      background: linear-gradient(to bottom, #151515, #090909);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 32px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    .close-btn {
      margin-top: 20px;
      padding: 10px 18px;
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
    }

    .close-btn:hover {
      background: white;
      color: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.2; }
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
      to { filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="title">

      <!-- 🔥 Logo -->
      <img src="純-白PNG.png" class="logo">

      <h1>純密室</h1>
      <p class="en">Chun's Room</p>
      <p class="tagline">有些門，不是為了被打開而存在。</p>
    </div>

    <div class="hallway">
      <div class="door" onclick="openDoor('door1')">
        <div class="door-number">101</div>
        <div class="knob"></div>
        <div class="door-label">第一分店</div>
      </div>

      <div class="door" onclick="openDoor('door2')">
        <div class="door-number">102</div>
        <div class="knob"></div>
        <div class="door-label">第二分店</div>
      </div>

      <div class="door" onclick="openDoor('door3')">
        <div class="door-number">103</div>
        <div class="knob"></div>
        <div class="door-label">關於純密室</div>
      </div>
    </div>

    <div class="hint">請選擇一扇門。</div>
  </div>

  <script>
    function openDoor(name) {
      alert("之後這裡會進入分店頁面 😏");
    }
  </script>

</body>
</html>
