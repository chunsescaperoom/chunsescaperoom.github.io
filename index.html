<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>純密室 Chun's Room</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:linear-gradient(#050505,#111,#1a1a1a);
color:white;
font-family:"Noto Sans TC";
overflow:hidden;
}

.overlay{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
}

.title{
text-align:center;
margin-bottom:60px;
}

.logo{
width:140px;
filter:drop-shadow(0 0 10px rgba(255,255,255,0.2));
}

.title h1{
margin:0;
font-size:48px;
letter-spacing:6px;
}

/* ===== 門 ===== */

.hallway{
display:flex;
gap:40px;
}

.door{
width:180px;
height:320px;
background:linear-gradient(#2c2c2c,#111);
border:1px solid rgba(255,255,255,0.2);
position:relative;
cursor:pointer;
transition:.3s;
}

.door:hover{
transform:translateY(-10px) scale(1.05);
}

.door-number{
position:absolute;
top:20px;
width:100%;
text-align:center;
letter-spacing:4px;
}

.door-label{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
}

/* 門把 */
.knob{
position:absolute;
right:20px;
top:50%;
width:10px;
height:10px;
background:white;
border-radius:50%;
}

/* 門縫 */
.door::after{
content:"";
position:absolute;
left:50%;
top:60px;
bottom:60px;
width:2px;
background:rgba(255,255,255,0.2);
transform:translateX(-50%);
transition:.2s;
}

/* 門縫閃光 */
.door.flash::after{
background:white;
box-shadow:0 0 14px white;
}

/* 被推一下 */
.door.hit{
animation:push .18s ease-out;
}

@keyframes push{
0%{transform:translateY(0);}
50%{transform:translateY(6px);}
100%{transform:translateY(0);}
}

/* 門內影子 */
.shadow{
position:absolute;
top:60px;
left:50%;
width:50px;
height:140px;
background:rgba(0,0,0,0.6);
filter:blur(8px);
transform:translateX(-50%);
opacity:.15;
animation:move 5s infinite;
}

@keyframes move{
0%{transform:translateX(-50%) scaleY(.9);}
50%{transform:translateX(-40%) scaleY(1.1);}
100%{transform:translateX(-50%) scaleY(.9);}
}

</style>
</head>

<body>

<div class="overlay">

<div class="title">
<img src="純-白PNG.png" class="logo">
<h1>純密室</h1>
</div>

<div class="hallway">

<div class="door" onclick="enterDoor(this,'zhongyuan.html')">
<div class="shadow"></div>
<div class="door-number">101</div>
<div class="knob"></div>
<div class="door-label">中原店</div>
</div>

<div class="door" onclick="enterDoor(this,'zhongli.html')">
<div class="shadow"></div>
<div class="door-number">102</div>
<div class="knob"></div>
<div class="door-label">中壢連合店</div>
</div>

<div class="door" onclick="enterDoor(this,'about.html')">
<div class="shadow"></div>
<div class="door-number">103</div>
<div class="knob"></div>
<div class="door-label">關於純密室</div>
</div>

</div>

</div>

<audio id="sound" src="door.mp3" preload="auto"></audio>

<script>
function playEffect(el){

  el.classList.remove("flash","hit");
  void el.offsetWidth;

  el.classList.add("flash");

  setTimeout(()=>{
    el.classList.add("hit");
  },80);

  setTimeout(()=>{
    el.classList.remove("flash","hit");
  },300);

  const sound=document.getElementById("sound");
  if(sound){
    sound.currentTime=0;
    sound.play().catch(()=>{});
  }
}

function enterDoor(el,url){

  playEffect(el);

  setTimeout(()=>{
    window.location.href=url;
  },220);
}
</script>

</body>
</html>
