<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>純密室 Chun's Room</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 20%),
        radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 35%),
        linear-gradient(to bottom, #050505 0%, #111 45%, #1a1a1a 100%);
      color: white;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .overlay {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 44px 24px 72px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.15) 30%, rgba(0,0,0,0.78) 100%);
      overflow: hidden;
    }

    .overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 20%),
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent 89px,
          rgba(255,255,255,0.01) 90px
        );
      pointer-events: none;
      opacity: 0.35;
    }

    .title {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 56px;
      animation: fadeIn 2s ease;
    }

    .logo {
      width: 150px;
      margin-bottom: 20px;
      opacity: 0.92;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
      animation: glow 3s infinite alternate;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(42px, 6vw, 58px);
      letter-spacing: 6px;
      font-weight: 700;
      text-shadow: 0 0 14px rgba(255,255,255,0.12);
    }

    .title .en {
      margin-top: 10px;
      font-size: 18px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 3px;
    }

    .title .tagline {
      margin-top: 16px;
      color: rgba(255,255,255,0.68);
      font-size: 15px;
      letter-spacing: 3px;
    }

    .hallway {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1040px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      animation: fadeInUp 1.8s ease;
    }

    .door {
      width: 190px;
      height: 330px;
      background:
        linear-gradient(to bottom, #2d2d31 0%, #17171b 45%, #0c0c10 100%);
      border: 1px solid rgba(255,255,255,0.12);
      position: relative;
      cursor: pointer;
      transition:
        transform 0.35s ease,
        box-shadow 0.35s ease,
        border-color 0.35s ease,
        filter 0.35s ease;
      box-shadow:
        0 0 24px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.03) inset;
      overflow: hidden;
    }

    .door:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(255,255,255,0.38);
      box-shadow:
        0 0 40px rgba(255,255,255,0.12),
        0 20px 40px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.05) inset;
      filter: brightness(1.05);
    }

    .door::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      bottom: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      z-index: 1;
    }

    /* 門縫 */
    .door::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 60px;
      bottom: 70px;
      width: 1px;
      transform: translateX(-50%);
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.14),
        rgba(255,255,255,0.02)
      );
      opacity: 0.55;
      transition: all 0.35s ease;
      z-index: 2;
      animation: slitBreath 4.2s ease-in-out infinite;
    }

    .door:hover::after {
      width: 2px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.85),
        rgba(255,255,255,0.08)
      );
      opacity: 1;
      box-shadow: 0 0 10px rgba(255,255,255,0.45);
    }

    /* 像裡面有人動過 */
    .door-motion {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .door-motion::before {
      content: "";
      position: absolute;
      top: 52px;
      left: 50%;
      width: 70px;
      height: 180px;
      transform: translateX(-50%);
      background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.07) 0%,
        rgba(255,255,255,0.025) 35%,
        transparent 72%
      );
      filter: blur(10px);
      opacity: 0.22;
      animation: shadowShift 6.8s ease-in-out infinite;
    }

    .door-motion::after {
      content: "";
      position: absolute;
      top: 80px;
      left: -40%;
      width: 70%;
      height: 120px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.05),
        transparent
      );
      transform: skewX(-12deg);
      filter: blur(8px);
      opacity: 0;
      animation: insideSweep 9s ease-in-out infinite;
    }

    .door-number {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.74);
      z-index: 3;
    }

    .door-label {
      position: absolute;
      bottom: 34px;
      width: 100%;
      text-align: center;
      font-size: 15px;
      color: rgba(255,255,255,0.88);
      letter-spacing: 2px;
      padding: 0 12px;
      line-height: 1.5;
      z-index: 3;
    }

    .knob {
      position: absolute;
      right: 24px;
      top: 52%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
      z-index: 3;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .door:hover .knob {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(255,255,255,0.45);
    }

    .hint {
      position: relative;
      z-index: 2;
      margin-top: 42px;
      font-size: 13px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 3px;
      animation: flicker 3s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.2; }
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
      to { filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
    }

    @keyframes slitBreath {
      0%, 100% {
        opacity: 0.4;
      }
      50% {
        opacity: 0.72;
      }
    }

    @keyframes shadowShift {
      0%, 100% {
        transform: translateX(-50%) translateY(0) scaleX(0.95);
        opacity: 0.14;
      }
      35% {
        transform: translateX(-46%) translateY(-2px) scaleX(1.05);
        opacity: 0.28;
      }
      65% {
        transform: translateX(-53%) translateY(1px) scaleX(0.92);
        opacity: 0.18;
      }
    }

    @keyframes insideSweep {
      0%, 75%, 100% {
        left: -40%;
        opacity: 0;
      }
      78% {
        opacity: 0.05;
      }
      86% {
        left: 45%;
        opacity: 0.12;
      }
      92% {
        left: 85%;
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      body {
        overflow-y: auto;
      }

      .overlay {
        justify-content: flex-start;
        padding: 40px 18px 60px;
      }

      .title {
        margin-bottom: 42px;
      }

      .logo {
        width: 128px;
      }

      .title h1 {
        letter-spacing: 4px;
      }

      .title .en {
        font-size: 16px;
      }

      .title .tagline {
        font-size: 14px;
        letter-spacing: 2px;
      }

      .hallway {
        gap: 24px;
      }

      .door {
        width: 145px;
        height: 255px;
      }

      .door::after {
        top: 54px;
        bottom: 58px;
      }

      .door-motion::before {
        top: 48px;
        width: 56px;
        height: 130px;
      }

      .door-motion::after {
        top: 70px;
        height: 92px;
      }

      .door-label {
        bottom: 26px;
        font-size: 14px;
      }

      .hint {
        margin-top: 34px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="title">
      <img src="純-白PNG.png" class="logo" alt="純密室 Logo">
      <h1>純密室</h1>
      <p class="en">Chun's Room</p>
      <p class="tagline">你今天，想要進入哪個房間？</p>
    </div>

    <div class="hallway">
      <div class="door" onclick="openDoor('door1')">
        <div class="door-motion"></div>
        <div class="door-number">101</div>
        <div class="knob"></div>
        <div class="door-label">中原店</div>
      </div>

      <div class="door" onclick="openDoor('door2')">
        <div class="door-motion"></div>
        <div class="door-number">102</div>
        <div class="knob"></div>
        <div class="door-label">中壢連合店</div>
      </div>

      <div class="door" onclick="openDoor('door3')">
        <div class="door-motion"></div>
        <div class="door-number">103</div>
        <div class="knob"></div>
        <div class="door-label">關於純密室</div>
      </div>
    </div>

    <div class="hint">請選擇一扇門。</div>
  </div>

  <script>
    function openDoor(name) {
      if (name === "door1") {
        window.location.href = "zhongyuan.html";
      } else if (name === "door2") {
        window.location.href = "zhongli.html";
      } else {
        window.location.href = "about.html";
      }
    }
  </script>
</body>
</html>
