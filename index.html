<style>
*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 18%),
    radial-gradient(circle at center, rgba(120, 80, 255, 0.06), transparent 32%),
    linear-gradient(to bottom, #030303 0%, #0c0c10 42%, #161616 100%);
  color:white;
  font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
}

.overlay{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:44px 24px 72px;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.18) 30%, rgba(0,0,0,0.82) 100%);
  overflow:hidden;
}

.overlay::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 16%),
    repeating-linear-gradient(
      to right,
      transparent 0,
      transparent 89px,
      rgba(255,255,255,0.01) 90px
    );
  pointer-events:none;
  opacity:0.28;
}

.title{
  position:relative;
  z-index:2;
  text-align:center;
  margin-bottom:58px;
  animation:fadeIn 1.8s ease;
}

.logo{
  width:150px;
  margin-bottom:20px;
  opacity:0.94;
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.2));
  animation:logoGlow 3s ease-in-out infinite alternate;
}

.title h1{
  margin:0;
  font-size:clamp(42px, 6vw, 58px);
  letter-spacing:6px;
  font-weight:700;
  text-shadow:0 0 14px rgba(255,255,255,0.12);
}

.title .en{
  margin-top:10px;
  font-size:18px;
  color:rgba(255,255,255,0.75);
  letter-spacing:3px;
}

.title .tagline{
  margin-top:16px;
  color:rgba(255,255,255,0.68);
  font-size:15px;
  letter-spacing:3px;
}

.hallway{
  position:relative;
  z-index:2;
  width:100%;
  max-width:1040px;
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
  animation:fadeInUp 1.4s ease;
}

.door{
  width:190px;
  height:330px;
  background:
    linear-gradient(to bottom, #323237 0%, #18181d 45%, #0a0a0d 100%);
  border:1px solid rgba(255,255,255,0.12);
  position:relative;
  cursor:pointer;
  transition:
    transform 0.35s ease,
    box-shadow 0.35s ease,
    border-color 0.35s ease,
    filter 0.35s ease;
  box-shadow:
    0 0 26px rgba(0,0,0,0.58),
    0 0 0 1px rgba(255,255,255,0.03) inset;
  overflow:hidden;
  transform-origin:center bottom;
  flex:0 0 auto;
}

.door:hover{
  transform:translateY(-12px) scale(1.03);
  border-color:rgba(255,255,255,0.42);
  box-shadow:
    0 0 48px rgba(255,255,255,0.14),
    0 24px 42px rgba(0,0,0,0.64),
    0 0 0 1px rgba(255,255,255,0.06) inset;
  filter:brightness(1.07);
}

.door::before{
  content:"";
  position:absolute;
  top:18px;
  left:18px;
  right:18px;
  bottom:18px;
  border:1px solid rgba(255,255,255,0.08);
  pointer-events:none;
  z-index:1;
}

.door::after{
  content:"";
  position:absolute;
  left:50%;
  top:56px;
  bottom:66px;
  width:2px;
  transform:translateX(-50%);
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.03)
  );
  opacity:0.75;
  z-index:3;
  box-shadow:0 0 10px rgba(255,255,255,0.08);
}

.door-number{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:18px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.74);
}

.door-label{
  position:absolute;
  bottom:34px;
  width:100%;
  text-align:center;
  font-size:15px;
  color:rgba(255,255,255,0.9);
  letter-spacing:2px;
}

.hint{
  margin-top:42px;
  font-size:13px;
  color:rgba(255,255,255,0.42);
  letter-spacing:3px;
}

  <div class="overlay">

      <p class="tagline">你今天，想要進入哪個房間？</p>
    </div>

    <div class="hallway">
      <div class="door" onclick="location.href='zhongyuan.html'">
        <div class="door-number">101</div>
        <div class="door-label">中原店</div>
      </div>

      <div class="door" onclick="location.href='zhongli.html'">
        <div class="door-number">102</div>
        <div class="door-label">中壢連合店</div>
      </div>

      <div class="door" onclick="location.href='about.html'">
        <div class="door-number">103</div>
        <div class="door-label">關於純密室</div>
      </div>
    </div>

    <div class="hint">請選擇一扇門。</div>
  </div>
</body>
