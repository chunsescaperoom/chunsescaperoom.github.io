<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chuns Escape Room</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(to bottom, #050505 0%, #111 45%, #1a1a1a 100%);
      color: white;
      font-family: "Noto Sans TC", sans-serif;
      overflow: hidden;
    }

    .overlay {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.15) 30%, rgba(0,0,0,0.75) 100%);
    }

    .title {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeIn 2s ease;
    }

    .title h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 4px;
      font-weight: 700;
    }

    .title p {
      margin-top: 14px;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      letter-spacing: 2px;
    }

    .hallway {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      animation: fadeInUp 1.8s ease;
    }

    .door {
      width: 180px;
      height: 320px;
      background: linear-gradient(to bottom, #2a2a2a, #111);
      border: 2px solid rgba(255,255,255,0.12);
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .door:hover {
      transform: translateY(-8px);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 30px rgba(255,255,255,0.08);
    }

    .door::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      bottom: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .door-number {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    .door-label {
      position: absolute;
      bottom: 35px;
      width: 100%;
      text-align: center;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
    }

    .knob {
      position: absolute;
      right: 24px;
      top: 52%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    .hint {
      margin-top: 40px;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      text-align: center;
      animation: flicker 3s infinite;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 10;
    }

    .modal-box {
      width: 100%;
      max-width: 640px;
      background: linear-gradient(to bottom, #151515, #090909);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 32px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      animation: fadeIn 0.4s ease;
    }

    .modal-box h2 {
      margin-top: 0;
      margin-bottom: 16px;
      letter-spacing: 3px;
      font-size: 28px;
    }

    .modal-box p {
      color: rgba(255,255,255,0.78);
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .close-btn {
      margin-top: 20px;
      padding: 10px 18px;
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .close-btn:hover {
      background: white;
      color: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 0.45; }
      20%, 24%, 55% { opacity: 0.18; }
    }

    @media (max-width: 768px) {
      .title h1 {
        font-size: 30px;
      }

      .door {
        width: 140px;
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="title">
      <h1>CHUNS ESCAPE ROOM</h1>
      <p>有些門，不是為了被打開而存在。</p>
    </div>

    <div class="hallway">
      <div class="door" onclick="openDoor('door1')">
        <div class="door-number">101</div>
        <div class="knob"></div>
        <div class="door-label">現行主題</div>
      </div>

      <div class="door" onclick="openDoor('door2')">
        <div class="door-number">102</div>
        <div class="knob"></div>
        <div class="door-label">品牌故事</div>
      </div>

      <div class="door" onclick="openDoor('door3')">
        <div class="door-number">103</div>
        <div class="knob"></div>
        <div class="door-label">未知房間</div>
      </div>
    </div>

    <div class="hint">請選擇一扇門。</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h2 id="modalTitle">房間</h2>
      <p id="modalText"></p>
      <button class="close-btn" onclick="closeModal()">關閉</button>
    </div>
  </div>

  <script>
    function openDoor(door) {
      const modal = document.getElementById("modal");
      const modalTitle = document.getElementById("modalTitle");
      const modalText = document.getElementById("modalText");

      if (door === "door1") {
        modalTitle.innerText = "101｜現行主題";
        modalText.innerText = "這裡之後可以放你現在主打的密室主題介紹、照片、遊戲人數、遊玩時間，或直接放預約資訊。";
      } else if (door === "door2") {
        modalTitle.innerText = "102｜品牌故事";
        modalText.innerText = "這裡可以寫你的品牌理念、你想做什麼樣的密室體驗、為什麼會開始設計這樣的空間。";
      } else if (door === "door3") {
        modalTitle.innerText = "103｜未知房間";
        modalText.innerText = "門後沒有回應。也許它還沒準備好被公開，也許它只會在對的人出現時打開。";
      }

      modal.style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>
</body>
</html>
