<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>關於純密室｜Chun's Room</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(98, 0, 255, 0.12), transparent 26%),
        radial-gradient(circle at right, rgba(0, 255, 255, 0.08), transparent 20%),
        linear-gradient(to bottom, #050505 0%, #0d0d12 48%, #141414 100%);
      color: white;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8, 8, 12, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .brand:hover {
      transform: scale(1.04);
      opacity: 0.95;
    }

    .brand img {
      width: 54px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
      transition: filter 0.25s ease;
    }

    .brand:hover img {
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.4));
    }

    .brand-text h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 2px;
      color: white;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 1px;
    }

    .back-btn {
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.25s ease;
      background: rgba(255,255,255,0.02);
    }

    .back-btn:hover {
      background: white;
      color: black;
    }

    .about-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 72px 20px 90px;
    }

    .about-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 56px 34px 42px;
      text-align: center;
      box-shadow: 0 14px 36px rgba(0,0,0,0.28);
      position: relative;
      overflow: hidden;
    }

    .about-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.04), transparent 35%);
      pointer-events: none;
    }

    .about-card > * {
      position: relative;
      z-index: 1;
    }

    .about-kicker {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.62);
      font-size: 13px;
      letter-spacing: 2px;
    }

    .about-card h2 {
      margin: 0 0 28px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: 3px;
      line-height: 1.1;
    }

    .about-text {
      margin: 0 auto;
      max-width: 720px;
      line-height: 2;
      font-size: 17px;
      color: rgba(255,255,255,0.82);
      white-space: pre-line;
    }

    .about-links {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .about-links a {
      display: inline-block;
      min-width: 148px;
      padding: 13px 24px;
      border-radius: 999px;
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }

    .about-links a:hover {
      transform: translateY(-2px);
      background: white;
      color: black;
      border-color: white;
    }

    .about-extra {
      margin-top: 32px;
      color: rgba(255,255,255,0.48);
      letter-spacing: 1px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 16px 18px;
      }

      .brand img {
        width: 48px;
      }

      .brand-text h1 {
        font-size: 20px;
      }

      .about-wrap {
        padding: 50px 18px 60px;
      }

      .about-card {
        padding: 38px 20px 32px;
        border-radius: 22px;
      }

      .about-text {
        font-size: 15px;
      }

      .about-links a {
        min-width: 132px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="brand" href="index.html">
      <img src="純-白PNG.png" alt="純密室 Logo">
      <div class="brand-text">
        <h1>純密室</h1>
        <p>Chun's Room</p>
      </div>
    </a>

    <a class="back-btn" href="index.html">返回首頁</a>
  </div>

  <section class="about-wrap">
    <div class="about-card">
      <div class="about-kicker">ABOUT CHUN'S ROOM</div>

      <h2>關於純密室</h2>

      <div class="about-text">純密室致力於講好每一個故事，無論大小時長，
只要進入Chun's room 給你全新思路，﻿
純的讓你樂不思蜀，回家之後牽腸掛肚。</div>

      <div class="about-links">
        <a href="https://www.facebook.com/chunsescaperoom" target="_blank" rel="noopener">Facebook</a>
        <a href="https://instagram.com/chunsroom/" target="_blank" rel="noopener">Instagram</a>
      </div>

      <div class="about-extra">
        有些房間，不只是被打開，而是被記住。
      </div>
    </div>
  </section>

</body>
</html>
