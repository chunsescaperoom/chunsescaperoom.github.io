<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>關於純密室｜Chun's Room</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom, #050505 0%, #111 45%, #1a1a1a 100%);
      color: white;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(10,10,10,0.82);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .brand:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .brand img {
      width: 46px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
      transition: filter 0.25s ease;
    }

    .brand:hover img {
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.45));
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .back-btn {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 999px;
      color: white;
      text-decoration: none;
      transition: 0.25s ease;
    }

    .back-btn:hover {
      background: white;
      color: black;
    }

    .about-wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 70px 20px 80px;
    }

    .about-card {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 35%),
        rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .about-card h2 {
      margin: 0 0 24px;
      font-size: 34px;
      letter-spacing: 3px;
    }

    .about-card p {
      margin: 0 auto;
      max-width: 720px;
      line-height: 2;
      font-size: 16px;
      color: rgba(255,255,255,0.78);
      white-space: pre-line;
    }

    .about-links {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .about-links a {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
      transition: 0.25s ease;
    }

    .about-links a:hover {
      transform: translateY(-2px);
      background: white;
      color: black;
    }

    @media (max-width: 768px) {
      .about-wrap {
        padding: 50px 18px 60px;
      }

      .about-card {
        padding: 32px 20px;
      }

      .about-card h2 {
        font-size: 28px;
      }

      .about-card p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="brand" href="index.html">
      <img src="純-白PNG.png" alt="純密室 Logo">
      <div>
        <h1>純密室</h1>
        <p>Chun's Room</p>
      </div>
    </a>

    <a class="back-btn" href="index.html">返回首頁</a>
  </div>

  <section class="about-wrap">
    <div class="about-card">
      <h2>關於純密室</h2>

      <p>純密室致力於講好每一個故事，無論大小時長，
只要進入Chun's room給你全新思路，﻿
純的讓你樂不思蜀，回家之後牽腸掛肚。</p>

      <div class="about-links">
        <a href="https://www.facebook.com/chunsescaperoom" target="_blank" rel="noopener">Facebook</a>
        <a href="instagram.com/chunsroom/" target="_blank" rel="noopener">Instagram</a>
      </div>
    </div>
  </section>

</body>
</html>
