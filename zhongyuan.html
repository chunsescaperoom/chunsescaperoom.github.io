<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中原店｜純密室 Chun's Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="zhongyuan.css">

  <style>
    * { box-sizing: border-box; }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card-link:hover {
      text-decoration: none;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 30%),
        linear-gradient(to bottom, #050505 0%, #111 50%, #1a1a1a 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand.logo-link {
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .brand.logo-link:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .brand img {
      width: 46px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
      transition: filter 0.25s ease;
    }

    .brand.logo-link:hover img {
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.45));
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>

<div class="topbar">
  <a class="brand logo-link" href="index.html">
    <img src="純-白PNG.png" alt="純密室 Logo">
    <div>
      <h1>純密室</h1>
      <p>Chun's Room</p>
    </div>
  </a>
  <a class="back-btn" href="index.html">返回</a>
</div>

<div class="hero">
  <h2>中原店</h2>
  <p>選擇你想進入的故事</p>
</div>

<div class="container">

  <div class="cards">
    <!-- 你的卡片區（完全沒動） -->
  </div>

  <!-- 原本資訊 -->
  <div class="info">
    <div style="font-size:18px; font-weight:700; margin-bottom:12px;">
      純密室｜中原店
    </div>

    <div style="color:rgba(255,255,255,0.75); line-height:1.9;">
      📍 桃園市中壢區協同街95號1樓<br>
      📞 <a href="tel:034162115" style="color:#9fe8ff;">03-416-2115</a><br><br>

      🕒 營業時間：13:00－22:00（週二公休）<br>
      🎟 採預約優先制<br>
      📩 僅開放官網預約<br><br>

      <span style="color:#ffb84d;">
        ※ 建議提前預約以確保場次
      </span>
    </div>

    <!-- ⭐ 新增的文案（重點在這） -->
    <div style="
      margin-top:40px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.7);
      line-height:1.9;
      text-align:center;
      max-width:600px;
      margin-left:auto;
      margin-right:auto;
    ">
      在密室需要一大群人的時代，<br>
      我們選擇做一件有點任性的事。<br><br>

      純密室中原店，全部都是 2～4 人即可進場的小型密室，<br>
      不需要湊人、不需要等待，想玩就能進去。<br><br>

      無論是兩個人、三個人，或只是剛好想逃離現實一下，<br>
      這裡都會有一個剛剛好的空間，等你進來。<br><br>

      <span style="color:rgba(255,255,255,0.4); font-size:13px;">
        （如果你正在找中壢雙人密室、小團密室，這裡就是了。）
      </span>
    </div>

  </div>

</div>

<script>
const cards = document.querySelectorAll('.card');

cards.forEach((card, index) => {
  card.style.transitionDelay = `${index * 0.1}s`;
});

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    } else {
      entry.target.classList.remove('show');
    }
  });
}, {
  threshold: 0.2
});

cards.forEach(card => {
  observer.observe(card);
});
</script>

</body>
</html>
