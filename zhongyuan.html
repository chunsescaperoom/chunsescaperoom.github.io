<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中原店｜純密室 Chun's Room</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="zhongyuan.css">

  <style>
    * { box-sizing: border-box; }

    body {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 30%),
        linear-gradient(to bottom, #050505 0%, #111 50%, #1a1a1a 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
    }

    /* 🔥 LOGO */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand.logo-link {
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .brand.logo-link:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .brand img {
      width: 46px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
      transition: 0.25s ease;
    }

    .brand.logo-link:hover img {
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.45));
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .back-btn {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 999px;
      color: white;
      text-decoration: none;
    }

    .back-btn:hover {
      background: white;
      color: black;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .hero h2 {
      font-size: 40px;
      margin: 0;
      letter-spacing: 3px;
    }

    .hero p {
      margin-top: 12px;
      color: rgba(255,255,255,0.7);
    }

    .container {
      max-width: 1300px;
      margin: auto;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: #121212;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: contain;
      background: black;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 26px;
      margin-bottom: 12px;
    }

    .card-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .meta {
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      text-align: center;
      background: #ff2d6f;
      padding: 14px;
      border-radius: 999px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      margin-top: auto;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .info {
      margin-top: 40px;
      padding: 24px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
    }

    .card:active {
      transform: scale(0.97);
    }

    @media (hover: none) {
      .card img {
        transform: scale(1.02);
      }
    }

    /* 🔥 關鍵：確保動畫正常 */
    .card {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s ease;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="topbar">
  <a class="brand logo-link" href="index.html">
    <img src="純-白PNG.png" alt="純密室 Logo">
    <div>
      <h1>純密室</h1>
      <p>Chun's Room</p>
    </div>
  </a>

  <a class="back-btn" href="index.html">返回</a>
</div>

<div class="hero">
  <h2>中原店</h2>
  <p>選擇你想進入的故事</p>
</div>

<div class="container">

  <div class="cards">

    <a class="card-link" href="cheese.html">
      <div class="card"><img src="奶酪.jpg"><div class="card-content"><div class="card-title">奶酪陷阱</div><div class="meta">300 / 人</div></div></div>
    </a>

    <a class="card-link" href="summer.html">
      <div class="card"><img src="暴走.jpg"><div class="card-content"><div class="card-title">暴走族</div><div class="meta">300 / 人</div></div></div>
    </a>

    <a class="card-link" href="punish.html">
      <div class="card"><img src="懲戒.jpg"><div class="card-content"><div class="card-title">懲戒</div><div class="meta">350 / 人</div></div></div>
    </a>

    <a class="card-link" href="persona.html">
      <div class="card"><img src="人格.jpg"><div class="card-content"><div class="card-title">人格之戰</div><div class="meta">300 / 人</div></div></div>
    </a>

  </div>

</div>

<script>
const cards = document.querySelectorAll('.card');

cards.forEach((card, index) => {
  card.style.transitionDelay = `${index * 0.1}s`;
});

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

cards.forEach(card => observer.observe(card));
</script>

</body>
</html>
