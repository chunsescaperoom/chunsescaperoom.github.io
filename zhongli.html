<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中壢連合店｜純密室 Chun's Room</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(130, 40, 255, 0.18), transparent 25%),
        radial-gradient(circle at right, rgba(0, 255, 255, 0.12), transparent 20%),
        linear-gradient(to bottom, #050505 0%, #0b0b12 45%, #111111 100%);
      color: white;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8, 8, 12, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 54px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(255, 208, 0, 0.2));
    }

    .brand-text h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 1px;
    }

    .back-btn {
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.25s ease;
      background: rgba(255,255,255,0.02);
    }

    .back-btn:hover {
      background: white;
      color: black;
    }

    .hero {
      text-align: center;
      padding: 64px 20px 30px;
    }

    .hero-logo {
      width: min(420px, 80vw);
      max-width: 100%;
      filter:
        drop-shadow(0 0 8px rgba(255, 208, 0, 0.35))
        drop-shadow(0 0 18px rgba(255, 150, 0, 0.22));
    }

    .hero h2 {
      margin: 24px 0 10px;
      font-size: 40px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.22);
    }

    .hero p {
      margin: 0 auto;
      max-width: 720px;
      color: rgba(255,255,255,0.72);
      line-height: 1.8;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 70px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 420px));
      justify-content: center;
      gap: 28px;
    }

    .card-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .card {
      background: linear-gradient(180deg, rgba(25,25,35,0.92), rgba(14,14,18,0.96));
      border: 1px solid rgba(182, 0, 255, 0.22);
      border-radius: 22px;
      padding: 24px;
      min-height: 100%;
      box-shadow:
        0 12px 30px rgba(0,0,0,0.35),
        0 0 0 1px rgba(0,255,255,0.03) inset;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      opacity: 0;
      transform: translateY(30px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(255, 0, 255, 0.45);
      box-shadow:
        0 16px 40px rgba(0,0,0,0.45),
        0 0 22px rgba(255, 0, 255, 0.18);
    }

    .card:active {
      transform: scale(0.98);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #ffd54f;
      text-shadow: 0 0 10px rgba(255, 213, 79, 0.22);
    }

    .sub-en {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #9fe8ff;
      text-shadow: 0 0 8px rgba(0,255,255,0.25);
    }

    .desc {
      line-height: 1.9;
      color: rgba(255,255,255,0.82);
      font-size: 16px;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 22px;
      border-radius: 999px;
      background: linear-gradient(45deg, #ff00cc, #5b5bff);
      color: white;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: 0 0 14px rgba(255,0,204,0.25);
      transition: 0.25s ease;
    }

    .card:hover .btn {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(255,0,204,0.35);
    }

    .coming {
      border-style: dashed;
      border-color: rgba(0,255,255,0.2);
      background: linear-gradient(180deg, rgba(20,20,28,0.9), rgba(10,10,14,0.96));
    }

    .glitch {
      position: relative;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,0,255,0.3);
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .glitch::before {
      color: #00ffff;
      z-index: -1;
      animation: glitch 1.1s infinite;
    }

    .glitch::after {
      color: #ff00cc;
      z-index: -2;
      animation: glitch 1.4s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, -2px); }
      80% { transform: translate(1px, 2px); }
      100% { transform: translate(0); }
    }

    .disabled {
      background: #2d2d35;
      color: #888;
      box-shadow: none;
      cursor: not-allowed;
    }

    @media (hover: none) {
      .card {
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .hero {
        padding-top: 50px;
      }

      .hero h2 {
        font-size: 32px;
      }

      .title {
        font-size: 24px;
      }

      .desc {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="純-白PNG.png" alt="純密室 Logo">
      <div class="brand-text">
        <h1>純密室</h1>
        <p>Chun's Room</p>
      </div>
    </div>
    <a class="back-btn" href="index.html">返回首頁</a>
  </div>

  <section class="hero">
    <img class="hero-logo" src="chunsroom.png" alt="CHUN'S ROOM">
    <h2>中壢連合店</h2>
    <p>霓虹、街頭、任務代號。選擇你即將進入的那一場異常事件。</p>
  </section>

  <main class="container">
    <div class="cards">

      <a class="card-link" href="zhanli.html">
        <div class="card">
          <div class="title">
            戰慄品
            <span class="sub-en">OVER MY DEAD BODY</span>
          </div>

          <div class="desc">
            哈夫伊貝夏村流傳著關於幽靈的傳說，<br>
            渾身是血、面目全非的女孩，<br>
            束縛在那罕無人煙的廢墟之中，<br>
            聽說見過女孩者，或傷或瘋、不得解脫。<br><br>

            你們是羅罕國退役的軍人，有勇有謀，<br>
            誓要親手破解傳說惡咒，<br>
            誰知話音剛落，你們便失去所有......
          </div>

          <div class="btn">進入遊戲</div>
        </div>
      </a>

      <div class="card coming">
        <div class="title glitch" data-text="COMING SOON">
          COMING SOON
          <span class="sub-en">NEW MISSION LOADING...</span>
        </div>

        <div class="desc">
          系統載入中……<br>
          未知任務即將解鎖。<br><br>
          訊號不穩，資料殘缺。<br>
          下一個故事，尚未對外公開。
        </div>

        <div class="btn disabled">尚未開放</div>
      </div>

    </div>
  </main>

  <script>
    const cards = document.querySelectorAll('.card');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        } else {
          entry.target.classList.remove('show');
        }
      });
    }, { threshold: 0.15 });

    cards.forEach(card => observer.observe(card));
  </script>

</body>
</html>
